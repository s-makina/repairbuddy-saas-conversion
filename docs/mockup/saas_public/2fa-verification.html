<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Two-Factor Authentication — RepairBuddy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #faf9f7;
            --surface: #fff;
            --surface-2: #f5f3f0;
            --border: #ebe8e3;
            --border-2: #d9d4cd;
            --text: #1a1714;
            --text-2: #6b6560;
            --text-3: #a09890;
            --orange: #e8590c;
            --orange-light: #f76707;
            --orange-bg: #fff4ed;
            --green: #2b8a3e;
            --green-bg: #f0fdf4;
            --blue: #1971c2;
            --blue-bg: #eff6ff;
            --r: 10px;
            --r-sm: 6px;
            --sh-lg: 0 8px 30px rgba(0, 0, 0, .1)
        }

        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px;
            position: relative;
            overflow-x: hidden
        }

        body::before {
            content: '';
            position: fixed;
            top: -150px;
            right: -150px;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(232, 89, 12, .06) 0%, transparent 70%);
            pointer-events: none
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -150px;
            left: -150px;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(112, 72, 232, .04) 0%, transparent 70%);
            pointer-events: none
        }

        a {
            text-decoration: none;
            color: inherit
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 36px
        }

        .logo-mark {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, #e8590c, #f76707);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(232, 89, 12, .25)
        }

        .logo-mark svg {
            width: 20px;
            height: 20px;
            color: #fff
        }

        .brand-name {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -.02em
        }

        .auth-card {
            background: var(--surface);
            width: 100%;
            max-width: 440px;
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: var(--sh-lg);
            padding: 40px 40px 36px;
            position: relative;
            overflow: hidden;
            animation: slideUp .6s ease forwards;
            text-align: center
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--orange), var(--orange-light), var(--orange))
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .tfa-icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: var(--blue-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            position: relative
        }

        .tfa-icon svg {
            width: 32px;
            height: 32px;
            color: var(--blue)
        }

        .tfa-icon::after {
            content: '';
            position: absolute;
            top: -4px;
            right: -4px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--orange);
            border: 3px solid var(--surface);
            display: flex;
            align-items: center;
            justify-content: center
        }

        .auth-card h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -.02em;
            margin-bottom: 8px
        }

        .auth-card .sub {
            font-size: 14px;
            color: var(--text-2);
            line-height: 1.6;
            margin-bottom: 24px
        }

        .phone-hint {
            font-weight: 700;
            color: var(--text)
        }

        /* CODE INPUTS */
        .code-inputs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 24px
        }

        .code-input {
            width: 52px;
            height: 62px;
            border: 2px solid var(--border);
            border-radius: 12px;
            text-align: center;
            font-size: 24px;
            font-weight: 800;
            font-family: inherit;
            color: var(--text);
            background: var(--surface);
            outline: none;
            transition: all .2s;
            caret-color: var(--orange)
        }

        .code-input:focus {
            border-color: var(--orange);
            box-shadow: 0 0 0 3px rgba(232, 89, 12, .1);
            background: var(--orange-bg)
        }

        .code-input.filled {
            border-color: var(--orange);
            background: var(--orange-bg)
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--orange);
            color: #fff;
            border: none;
            border-radius: var(--r);
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all .2s;
            box-shadow: 0 2px 12px rgba(232, 89, 12, .3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px
        }

        .btn-submit:hover {
            background: #cf4c08;
            transform: translateY(-1px)
        }

        .btn-submit svg {
            width: 18px;
            height: 18px
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 24px 0
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border)
        }

        .divider span {
            font-size: 12px;
            color: var(--text-3);
            font-weight: 500
        }

        .alt-methods {
            display: flex;
            flex-direction: column;
            gap: 10px
        }

        .alt-btn {
            width: 100%;
            padding: 11px;
            border: 1.5px solid var(--border);
            border-radius: var(--r);
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            background: var(--surface);
            color: var(--text-2);
            cursor: pointer;
            transition: all .2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px
        }

        .alt-btn:hover {
            background: var(--surface-2);
            border-color: var(--border-2);
            color: var(--text)
        }

        .alt-btn svg {
            width: 16px;
            height: 16px
        }

        .resend {
            margin-top: 20px;
            font-size: 13px;
            color: var(--text-3)
        }

        .resend a {
            color: var(--orange);
            font-weight: 700;
            cursor: pointer
        }

        .resend a:hover {
            text-decoration: underline
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-3);
            transition: color .2s
        }

        .back-link:hover {
            color: var(--orange)
        }

        .back-link svg {
            width: 14px;
            height: 14px
        }

        @media(max-width:500px) {
            .auth-card {
                padding: 28px 20px
            }

            .code-input {
                width: 44px;
                height: 54px;
                font-size: 20px
            }
        }
    </style>
</head>

<body>
    <a href="landing.html" class="brand">
        <div class="logo-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path
                    d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z" />
            </svg></div>
        <span class="brand-name">RepairBuddy</span>
    </a>

    <div class="auth-card">
        <div class="tfa-icon">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
        </div>

        <h1>Two-factor authentication</h1>
        <p class="sub">Enter the 6-digit code sent to your phone ending in <span class="phone-hint">••••4567</span></p>

        <form>
            <div class="code-inputs">
                <input type="text" class="code-input filled" maxlength="1" value="7" autofocus>
                <input type="text" class="code-input filled" maxlength="1" value="3">
                <input type="text" class="code-input filled" maxlength="1" value="8">
                <input type="text" class="code-input" maxlength="1" placeholder="·">
                <input type="text" class="code-input" maxlength="1" placeholder="·">
                <input type="text" class="code-input" maxlength="1" placeholder="·">
            </div>

            <button type="submit" class="btn-submit">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                </svg>
                Verify & Sign In
            </button>
        </form>

        <div class="divider"><span>or try another method</span></div>

        <div class="alt-methods">
            <button class="alt-btn">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                </svg>
                Send code via email
            </button>
            <button class="alt-btn">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z" />
                </svg>
                Use authenticator app
            </button>
        </div>

        <div class="resend">
            Didn't receive the code? <a href="#">Resend code</a>
        </div>
    </div>

    <a href="login.html" class="back-link">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
        </svg>
        Use a different account
    </a>

    <script>
        // Auto-focus next input on keyup
        const inputs = document.querySelectorAll('.code-input');
        inputs.forEach((inp, i) => {
            inp.addEventListener('input', () => {
                if (inp.value && i < inputs.length - 1) inputs[i + 1].focus();
                inp.classList.toggle('filled', inp.value.length > 0);
            });
            inp.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !inp.value && i > 0) {
                    inputs[i - 1].focus();
                    inputs[i - 1].classList.remove('filled');
                }
            });
        });
    </script>
</body>

</html>
