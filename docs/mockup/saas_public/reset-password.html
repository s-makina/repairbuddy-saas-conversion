<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password — RepairBuddy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #faf9f7;
            --surface: #fff;
            --surface-2: #f5f3f0;
            --border: #ebe8e3;
            --border-2: #d9d4cd;
            --text: #1a1714;
            --text-2: #6b6560;
            --text-3: #a09890;
            --orange: #e8590c;
            --orange-light: #f76707;
            --orange-bg: #fff4ed;
            --green: #2b8a3e;
            --green-bg: #f0fdf4;
            --r: 10px;
            --r-sm: 6px;
            --sh-lg: 0 8px 30px rgba(0, 0, 0, .1)
        }

        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px;
            position: relative;
            overflow-x: hidden
        }

        body::before {
            content: '';
            position: fixed;
            top: -150px;
            right: -150px;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(232, 89, 12, .06) 0%, transparent 70%);
            pointer-events: none
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -150px;
            left: -150px;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(112, 72, 232, .04) 0%, transparent 70%);
            pointer-events: none
        }

        a {
            text-decoration: none;
            color: inherit
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 36px
        }

        .logo-mark {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, #e8590c, #f76707);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(232, 89, 12, .25)
        }

        .logo-mark svg {
            width: 20px;
            height: 20px;
            color: #fff
        }

        .brand-name {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -.02em
        }

        .auth-card {
            background: var(--surface);
            width: 100%;
            max-width: 440px;
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: var(--sh-lg);
            padding: 40px 40px 36px;
            position: relative;
            overflow: hidden;
            animation: slideUp .6s ease forwards
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--orange), var(--orange-light), var(--orange))
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .shield-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--green-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px
        }

        .shield-icon svg {
            width: 28px;
            height: 28px;
            color: var(--green)
        }

        .auth-header {
            text-align: center;
            margin-bottom: 28px
        }

        .auth-header h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -.02em;
            margin-bottom: 8px
        }

        .auth-header p {
            font-size: 14px;
            color: var(--text-2);
            line-height: 1.6
        }

        .form-group {
            margin-bottom: 18px
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 7px
        }

        .input-wrap {
            position: relative
        }

        .input-wrap svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 17px;
            height: 17px;
            color: var(--text-3);
            pointer-events: none
        }

        .form-input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            border: 1.5px solid var(--border);
            border-radius: var(--r);
            font-size: 14px;
            font-family: inherit;
            font-weight: 500;
            background: var(--surface);
            color: var(--text);
            outline: none;
            transition: all .2s
        }

        .form-input:focus {
            border-color: var(--orange);
            box-shadow: 0 0 0 3px rgba(232, 89, 12, .08)
        }

        .form-input::placeholder {
            color: var(--text-3);
            font-weight: 400
        }

        .pw-strength {
            display: flex;
            gap: 4px;
            margin-top: 8px
        }

        .pw-bar {
            flex: 1;
            height: 3px;
            border-radius: 3px;
            background: var(--border)
        }

        .pw-bar.filled {
            background: var(--orange)
        }

        .pw-bar.strong {
            background: var(--green)
        }

        .pw-rules {
            margin-top: 12px;
            padding: 12px 14px;
            background: var(--surface-2);
            border-radius: var(--r-sm);
            border: 1px solid var(--border)
        }

        .pw-rule {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-3);
            padding: 3px 0
        }

        .pw-rule.pass {
            color: var(--green)
        }

        .pw-rule svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--orange);
            color: #fff;
            border: none;
            border-radius: var(--r);
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all .2s;
            box-shadow: 0 2px 12px rgba(232, 89, 12, .3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 24px
        }

        .btn-submit:hover {
            background: #cf4c08;
            transform: translateY(-1px)
        }

        .btn-submit svg {
            width: 18px;
            height: 18px
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-3);
            transition: color .2s
        }

        .back-link:hover {
            color: var(--orange)
        }

        .back-link svg {
            width: 14px;
            height: 14px
        }

        @media(max-width:500px) {
            .auth-card {
                padding: 28px 24px
            }
        }
    </style>
</head>

<body>
    <a href="landing.html" class="brand">
        <div class="logo-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path
                    d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z" />
            </svg></div>
        <span class="brand-name">RepairBuddy</span>
    </a>

    <div class="auth-card">
        <div class="shield-icon">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                    d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
            </svg>
        </div>
        <div class="auth-header">
            <h1>Set new password</h1>
            <p>Your new password must be different from previously used passwords.</p>
        </div>

        <form>
            <div class="form-group">
                <label class="form-label">New Password</label>
                <div class="input-wrap">
                    <input type="password" class="form-input" placeholder="Enter new password" required>
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                </div>
                <div class="pw-strength">
                    <div class="pw-bar filled"></div>
                    <div class="pw-bar filled"></div>
                    <div class="pw-bar strong"></div>
                    <div class="pw-bar"></div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Confirm New Password</label>
                <div class="input-wrap">
                    <input type="password" class="form-input" placeholder="Re-enter new password" required>
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                    </svg>
                </div>
            </div>

            <div class="pw-rules">
                <div class="pw-rule pass"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7" />
                    </svg>At least 8 characters</div>
                <div class="pw-rule pass"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7" />
                    </svg>Contains uppercase letter</div>
                <div class="pw-rule pass"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7" />
                    </svg>Contains a number</div>
                <div class="pw-rule"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01" />
                    </svg>Contains special character</div>
            </div>

            <button type="submit" class="btn-submit">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                </svg>
                Reset Password
            </button>
        </form>
    </div>

    <a href="login.html" class="back-link">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
        </svg>
        Back to sign in
    </a>
</body>

</html>
