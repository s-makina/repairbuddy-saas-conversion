<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password — QuickFix Electronics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --rb-blue: #063e70;
            --rb-blue-light: #0a5fa3;
            --rb-orange: #fd6742;
            --rb-bg: #fcfdfe;
            --rb-border: #f1f5f9;
            --rb-text: #0f172a;
            --rb-text-2: #64748b;
            --rb-text-3: #94a3b8
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--rb-bg);
            background-image: radial-gradient(at 0% 0%, rgba(253, 103, 66, .03) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(6, 62, 112, .03) 0px, transparent 50%);
            color: var(--rb-text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px
        }

        a {
            text-decoration: none;
            color: inherit
        }

        .tenant-badge {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px
        }

        .shop-logo {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--rb-blue), var(--rb-blue-light));
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 800;
            font-size: 15px;
            box-shadow: 0 2px 8px rgba(6, 62, 112, .2)
        }

        .shop-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--rb-text)
        }

        .shop-sub {
            font-size: 11px;
            color: var(--rb-text-3);
            font-weight: 500
        }

        .auth-card {
            background: #fff;
            width: 100%;
            max-width: 440px;
            padding: 44px 48px;
            border-radius: 32px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, .04);
            border: 1px solid rgba(226, 232, 240, .8);
            position: relative;
            overflow: hidden;
            animation: reveal .8s cubic-bezier(.4, 0, .2, 1) forwards
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--rb-blue), var(--rb-orange));
            opacity: .8
        }

        @keyframes reveal {
            from {
                opacity: 0;
                transform: translateY(20px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .lock-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: rgba(6, 62, 112, .06);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px
        }

        .lock-icon svg {
            width: 28px;
            height: 28px;
            color: var(--rb-blue)
        }

        .auth-header {
            text-align: center;
            margin-bottom: 28px
        }

        .auth-header h1 {
            font-size: 1.85rem;
            font-weight: 800;
            letter-spacing: -.5px;
            margin-bottom: 8px
        }

        .auth-header p {
            color: var(--rb-text-2);
            font-size: .95rem;
            line-height: 1.6
        }

        .input-group {
            position: relative;
            margin-bottom: 20px
        }

        .form-label {
            display: block;
            font-weight: 600;
            font-size: .9rem;
            color: var(--rb-text);
            margin-bottom: 10px
        }

        .input-wrap {
            position: relative
        }

        .input-wrap svg {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: var(--rb-text-3);
            pointer-events: none
        }

        .form-input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 1.5px solid #eef2f6;
            border-radius: 16px;
            font-size: .95rem;
            font-family: inherit;
            font-weight: 500;
            background: #fcfdfe;
            color: var(--rb-text);
            outline: none;
            transition: all .3s
        }

        .form-input:focus {
            border-color: var(--rb-blue);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(6, 62, 112, .08)
        }

        .form-input::placeholder {
            color: var(--rb-text-3);
            font-weight: 400
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: var(--rb-blue);
            color: #fff;
            border: none;
            border-radius: 16px;
            font-size: 1.05rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all .4s cubic-bezier(.4, 0, .2, 1);
            box-shadow: 0 10px 20px rgba(6, 62, 112, .1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px
        }

        .btn-submit:hover {
            background: #05335d;
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(6, 62, 112, .2)
        }

        .btn-submit svg {
            width: 18px;
            height: 18px
        }

        .footer-link {
            text-align: center;
            margin-top: 28px;
            font-size: .95rem;
            color: var(--rb-text-2)
        }

        .footer-link a {
            color: var(--rb-blue);
            font-weight: 700
        }

        .footer-link a:hover {
            text-decoration: underline
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 18px;
            font-size: 13px;
            color: var(--rb-text-3);
            transition: color .2s
        }

        .back-link:hover {
            color: var(--rb-blue)
        }

        .back-link svg {
            width: 14px;
            height: 14px
        }

        @media(max-width:500px) {
            .auth-card {
                padding: 32px 24px
            }
        }
    </style>
</head>

<body>
    <a href="tenant-welcome.html" class="tenant-badge">
        <div class="shop-logo">QF</div>
        <div>
            <div class="shop-name">QuickFix Electronics</div>
            <div class="shop-sub">quickfix.repairbuddy.com</div>
        </div>
    </a>

    <div class="auth-card">
        <div class="lock-icon">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                    d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
            </svg>
        </div>
        <div class="auth-header">
            <h1>Forgot your password?</h1>
            <p>No worries! Enter the email address associated with your account and we'll send you a reset link.</p>
        </div>

        <form>
            <div class="input-group">
                <label class="form-label">Email Address</label>
                <div class="input-wrap">
                    <input type="email" class="form-input" placeholder="name@company.com" required />
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                    </svg>
                </div>
            </div>
            <button type="submit" class="btn-submit">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                </svg>
                Send Reset Link
            </button>
        </form>

        <div class="footer-link">
            Remember your password? <a href="tenant-login.html">Sign in</a>
        </div>
    </div>

    <a href="tenant-login.html" class="back-link">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
        </svg>
        Back to sign in
    </a>
</body>

</html>
