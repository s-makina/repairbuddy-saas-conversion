<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password — RepairBuddy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #faf9f7;
            --surface: #fff;
            --surface-2: #f5f3f0;
            --border: #ebe8e3;
            --border-2: #d9d4cd;
            --text: #1a1714;
            --text-2: #6b6560;
            --text-3: #a09890;
            --orange: #e8590c;
            --orange-light: #f76707;
            --orange-bg: #fff4ed;
            --r: 10px;
            --r-sm: 6px;
            --r-lg: 16px;
            --sh-lg: 0 8px 30px rgba(0, 0, 0, .1)
        }

        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px;
            position: relative;
            overflow-x: hidden
        }

        body::before {
            content: '';
            position: fixed;
            top: -150px;
            right: -150px;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(232, 89, 12, .06) 0%, transparent 70%);
            pointer-events: none
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -150px;
            left: -150px;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(112, 72, 232, .04) 0%, transparent 70%);
            pointer-events: none
        }

        a {
            text-decoration: none;
            color: inherit
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 36px
        }

        .logo-mark {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, #e8590c, #f76707);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(232, 89, 12, .25)
        }

        .logo-mark svg {
            width: 20px;
            height: 20px;
            color: #fff
        }

        .brand-name {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -.02em
        }

        .auth-card {
            background: var(--surface);
            width: 100%;
            max-width: 440px;
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: var(--sh-lg);
            padding: 40px 40px 36px;
            position: relative;
            overflow: hidden;
            animation: slideUp .6s ease forwards
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--orange), var(--orange-light), var(--orange))
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .lock-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--orange-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px
        }

        .lock-icon svg {
            width: 28px;
            height: 28px;
            color: var(--orange)
        }

        .auth-header {
            text-align: center;
            margin-bottom: 28px
        }

        .auth-header h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -.02em;
            margin-bottom: 8px
        }

        .auth-header p {
            font-size: 14px;
            color: var(--text-2);
            line-height: 1.6
        }

        .form-group {
            margin-bottom: 18px
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 7px
        }

        .input-wrap {
            position: relative
        }

        .input-wrap svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 17px;
            height: 17px;
            color: var(--text-3);
            pointer-events: none;
            transition: color .2s
        }

        .form-input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            border: 1.5px solid var(--border);
            border-radius: var(--r);
            font-size: 14px;
            font-family: inherit;
            font-weight: 500;
            background: var(--surface);
            color: var(--text);
            outline: none;
            transition: all .2s
        }

        .form-input:focus {
            border-color: var(--orange);
            box-shadow: 0 0 0 3px rgba(232, 89, 12, .08)
        }

        .form-input::placeholder {
            color: var(--text-3);
            font-weight: 400
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--orange);
            color: #fff;
            border: none;
            border-radius: var(--r);
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all .2s;
            box-shadow: 0 2px 12px rgba(232, 89, 12, .3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 24px
        }

        .btn-submit:hover {
            background: #cf4c08;
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(232, 89, 12, .35)
        }

        .btn-submit svg {
            width: 18px;
            height: 18px
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-3)
        }

        .auth-footer a {
            color: var(--orange);
            font-weight: 700
        }

        .auth-footer a:hover {
            text-decoration: underline
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 20px;
            font-size: 13px;
            color: var(--text-3);
            transition: color .2s
        }

        .back-link:hover {
            color: var(--orange)
        }

        .back-link svg {
            width: 14px;
            height: 14px
        }

        @media(max-width:500px) {
            .auth-card {
                padding: 28px 24px
            }
        }
    </style>
</head>

<body>
    <a href="landing.html" class="brand">
        <div class="logo-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path
                    d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z" />
            </svg></div>
        <span class="brand-name">RepairBuddy</span>
    </a>

    <div class="auth-card">
        <div class="lock-icon">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                    d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
            </svg>
        </div>
        <div class="auth-header">
            <h1>Forgot your password?</h1>
            <p>No worries! Enter the email address associated with your account and we'll send you a reset link.</p>
        </div>

        <form>
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <div class="input-wrap">
                    <input type="email" class="form-input" placeholder="john@repairshop.com" required>
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                    </svg>
                </div>
            </div>
            <button type="submit" class="btn-submit">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                </svg>
                Send Reset Link
            </button>
        </form>
    </div>

    <div class="auth-footer">
        Remember your password? <a href="login.html">Sign in</a>
    </div>
    <a href="login.html" class="back-link">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
        </svg>
        Back to sign in
    </a>
</body>

</html>
