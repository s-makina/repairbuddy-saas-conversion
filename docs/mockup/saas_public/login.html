<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — 99SmartX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #faf9f7;
            --surface: #fff;
            --surface-2: #f5f3f0;
            --border: #ebe8e3;
            --border-2: #d9d4cd;
            --text: #1a1714;
            --text-2: #6b6560;
            --text-3: #a09890;
            --orange: #e8590c;
            --orange-light: #f76707;
            --orange-bg: #fff4ed;
            --green: #2b8a3e;
            --green-bg: #f0fdf4;
            --r: 10px;
            --r-sm: 6px;
            --r-lg: 16px;
            --sh: 0 1px 3px rgba(0, 0, 0, .06);
            --sh-md: 0 4px 12px rgba(0, 0, 0, .08);
            --sh-lg: 0 8px 30px rgba(0, 0, 0, .1);
        }

        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px;
            position: relative;
            overflow-x: hidden
        }

        body::before {
            content: '';
            position: fixed;
            top: -150px;
            right: -150px;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(232, 89, 12, .06) 0%, transparent 70%);
            pointer-events: none
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -150px;
            left: -150px;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(112, 72, 232, .04) 0%, transparent 70%);
            pointer-events: none
        }

        a {
            text-decoration: none;
            color: inherit
        }

        /* ─── BRAND ─── */
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 36px
        }

        .logo-mark {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, #e8590c, #f76707);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(232, 89, 12, .25)
        }

        .logo-mark svg {
            width: 20px;
            height: 20px;
            color: #fff
        }

        .brand-name {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -.02em
        }

        /* ─── CARD ─── */
        .auth-card {
            background: var(--surface);
            width: 100%;
            max-width: 440px;
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: var(--sh-lg);
            padding: 40px 40px 36px;
            position: relative;
            overflow: hidden;
            animation: slideUp .6s ease forwards
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--orange), var(--orange-light), var(--orange))
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        /* ─── HEADER ─── */
        .auth-header {
            text-align: center;
            margin-bottom: 28px
        }

        .auth-header h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -.02em;
            margin-bottom: 8px
        }

        .auth-header p {
            font-size: 14px;
            color: var(--text-2);
            line-height: 1.5
        }

        /* ─── FORM ─── */
        .form-group {
            margin-bottom: 18px
        }

        .form-label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 7px
        }

        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text)
        }

        .forgot-link {
            font-size: 12px;
            font-weight: 600;
            color: var(--orange);
            transition: opacity .2s
        }

        .forgot-link:hover {
            opacity: .8
        }

        .input-wrap {
            position: relative
        }

        .input-wrap svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 17px;
            height: 17px;
            color: var(--text-3);
            pointer-events: none;
            transition: color .2s
        }

        .form-input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            border: 1.5px solid var(--border);
            border-radius: var(--r);
            font-size: 14px;
            font-family: inherit;
            font-weight: 500;
            background: var(--surface);
            color: var(--text);
            outline: none;
            transition: all .2s
        }

        .form-input:focus {
            border-color: var(--orange);
            box-shadow: 0 0 0 3px rgba(232, 89, 12, .08)
        }

        .form-input:focus+svg {
            color: var(--orange)
        }

        .form-input::placeholder {
            color: var(--text-3);
            font-weight: 400
        }

        .pw-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-3);
            transition: color .2s;
            background: none;
            border: none;
            padding: 4px;
            display: flex
        }

        .pw-toggle:hover {
            color: var(--orange)
        }

        .pw-toggle svg {
            width: 17px;
            height: 17px;
            position: static;
            transform: none;
            pointer-events: none
        }

        /* ─── CHECKBOX ─── */
        .check-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 22px 0 26px
        }

        .check-group {
            display: flex;
            align-items: center;
            gap: 8px
        }

        .check-group input[type="checkbox"] {
            width: 16px;
            height: 16px;
            border: 1.5px solid var(--border-2);
            border-radius: 4px;
            cursor: pointer;
            accent-color: var(--orange)
        }

        .check-group label {
            font-size: 13px;
            color: var(--text-2);
            cursor: pointer;
            font-weight: 500
        }

        /* ─── BUTTON ─── */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--orange);
            color: #fff;
            border: none;
            border-radius: var(--r);
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all .2s;
            box-shadow: 0 2px 12px rgba(232, 89, 12, .3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px
        }

        .btn-submit:hover {
            background: #cf4c08;
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(232, 89, 12, .35)
        }

        .btn-submit svg {
            width: 18px;
            height: 18px
        }

        /* ─── DIVIDER ─── */
        .divider {
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 24px 0
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border)
        }

        .divider span {
            font-size: 12px;
            color: var(--text-3);
            font-weight: 500
        }

        /* ─── SOCIAL ─── */
        .social-btn {
            width: 100%;
            padding: 12px;
            border: 1.5px solid var(--border);
            border-radius: var(--r);
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            transition: all .2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px
        }

        .social-btn:hover {
            background: var(--surface-2);
            border-color: var(--border-2)
        }

        .social-btn svg {
            width: 18px;
            height: 18px
        }

        /* ─── FOOTER ─── */
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-3)
        }

        .auth-footer a {
            color: var(--orange);
            font-weight: 700
        }

        .auth-footer a:hover {
            text-decoration: underline
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 20px;
            font-size: 13px;
            color: var(--text-3);
            transition: color .2s
        }

        .back-link:hover {
            color: var(--orange)
        }

        .back-link svg {
            width: 14px;
            height: 14px
        }

        @media(max-width:500px) {
            .auth-card {
                padding: 28px 24px
            }
        }
    </style>
</head>

<body>

    <!-- BRAND -->
    <a href="landing.html" class="brand">
        <div class="logo-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path
                    d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z" />
            </svg></div>
        <span class="brand-name">99SmartX</span>
    </a>

    <!-- AUTH CARD -->
    <div class="auth-card">
        <div class="auth-header">
            <h1>Welcome back</h1>
            <p>Sign in to manage your repair shop</p>
        </div>

        <form>
            <!-- Email -->
            <div class="form-group">
                <label class="form-label" style="display:block;margin-bottom:7px">Email Address</label>
                <div class="input-wrap">
                    <input type="email" class="form-input" placeholder="john@repairshop.com" required>
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                    </svg>
                </div>
            </div>

            <!-- Password -->
            <div class="form-group">
                <div class="form-label-row">
                    <label class="form-label">Password</label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>
                <div class="input-wrap">
                    <input type="password" class="form-input" id="pw-input" placeholder="Enter your password" required>
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                    <button type="button" class="pw-toggle" onclick="togglePw()">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" id="eye-icon">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Remember me -->
            <div class="check-row">
                <div class="check-group">
                    <input type="checkbox" id="remember">
                    <label for="remember">Remember me</label>
                </div>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn-submit">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
                </svg>
                Sign In
            </button>
        </form>

        <div class="divider"><span>or continue with</span></div>

        <button class="social-btn">
            <svg viewBox="0 0 24 24" fill="none">
                <path
                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"
                    fill="#4285F4" />
                <path
                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                    fill="#34A853" />
                <path
                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 001 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z"
                    fill="#FBBC05" />
                <path
                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                    fill="#EA4335" />
            </svg>
            Continue with Google
        </button>
    </div>

    <!-- FOOTER LINK -->
    <div class="auth-footer">
        Don't have an account? <a href="register.html">Create one</a>
    </div>
    <a href="landing.html" class="back-link">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
        </svg>
        Back to home
    </a>

    <script>
        function togglePw() {
            const input = document.getElementById('pw-input');
            input.type = input.type === 'password' ? 'text' : 'password';
        }
    </script>

</body>

</html>
