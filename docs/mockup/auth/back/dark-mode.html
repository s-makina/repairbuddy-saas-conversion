<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | 99SmartX Dark Mode</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        :root {
            --rb-blue: #0ea5e9;
            /* Lighter blue for dark mode visibility */
            --rb-orange: #fd6742;
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-dark: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Decorative background elements */
        .glow {
            position: absolute;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
            filter: blur(50px);
        }

        .glow-1 {
            top: -10%;
            left: -10%;
        }

        .glow-2 {
            bottom: -10%;
            right: -10%;
            background: radial-gradient(circle, rgba(253, 103, 66, 0.1) 0%, transparent 70%);
        }

        .login-card {
            background: var(--card-dark);
            width: 100%;
            max-width: 400px;
            padding: 48px;
            border-radius: 24px;
            border: 1px solid var(--border-dark);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
        }

        .login-card:hover {
            border-color: rgba(14, 165, 233, 0.3);
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.1);
        }

        .brand-logo {
            font-weight: 800;
            font-size: 1.8rem;
            color: #fff;
            margin-bottom: 32px;
            text-align: center;
        }

        .brand-logo span {
            color: var(--rb-orange);
        }

        .login-header h1 {
            font-weight: 700;
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .login-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 32px;
        }

        .form-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .form-control {
            background-color: #0f172a;
            border: 1px solid var(--border-dark);
            border-radius: 12px;
            padding: 14px 16px;
            color: #fff;
            font-size: 0.95rem;
        }

        .form-control:focus {
            background-color: #0f172a;
            border-color: var(--rb-blue);
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.15);
            color: #fff;
        }

        .btn-premium {
            background: linear-gradient(135deg, #0ea5e9 0%, #0369a1 100%);
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-weight: 600;
            color: #fff;
            width: 100%;
            margin-top: 24px;
            transition: all 0.3s ease;
        }

        .btn-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.4);
            filter: brightness(1.1);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: var(--text-muted);
            font-size: 0.75rem;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border-dark);
        }

        .divider span {
            padding: 0 12px;
        }

        .btn-outline-custom {
            border: 1px solid var(--border-dark);
            color: var(--text-main);
            border-radius: 12px;
            padding: 12px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 0.9rem;
            margin-bottom: 12px;
            transition: all 0.2s;
        }

        .btn-outline-custom:hover {
            background-color: rgba(255, 255, 255, 0.05);
            border-color: var(--text-muted);
        }

        .footer-text {
            text-align: center;
            margin-top: 32px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .footer-text a {
            color: var(--rb-blue);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <div class="login-card">
        <div class="brand-logo">
            99<span>SmartX</span>
        </div>

        <div class="login-header text-center">
            <h1>Admin Login</h1>
            <p>Securely access your repair terminal</p>
        </div>

        <form>
            <div class="mb-3">
                <label class="form-label">Identifier</label>
                <input type="text" class="form-control" placeholder="Email or Username">
            </div>
            <div class="mb-4">
                <label class="form-label">Passkey</label>
                <input type="password" class="form-control" placeholder="••••••••">
            </div>

            <button type="submit" class="btn btn-premium">Authorize Session</button>
        </form>

        <div class="divider">
            <span>OR CONTINUE WITH</span>
        </div>

        <div class="social-login">
            <a href="#" class="btn-outline-custom">
                <i class="bi bi-shield-lock-fill"></i> SS0 Identity
            </a>
        </div>

        <div class="footer-text">
            Forgot credentials? <a href="#">Recovery Portal</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
