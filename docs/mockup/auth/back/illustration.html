<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | 99SmartX Friendly</title>
    <!-- Google Fonts: Fredoka & Quicksand -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --rb-blue: #063e70;
            --rb-orange: #fd6742;
            --soft-blue: #e0e7ff;
            --soft-bg: #fdfdfd;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--soft-bg);
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .container-custom {
            display: flex;
            background: #fff;
            border-radius: 40px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.05);
            max-width: 1000px;
            width: 90%;
            overflow: hidden;
            margin: 20px;
        }

        /* Illustration Side */
        .illustration-side {
            flex: 1;
            background-color: var(--soft-blue);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px;
            position: relative;
        }

        .illustration-image {
            width: 100%;
            max-width: 350px;
            height: auto;
            margin-bottom: 40px;
            z-index: 1;
        }

        .circle-bg {
            position: absolute;
            width: 300px;
            height: 300px;
            background: #fff;
            border-radius: 50%;
            opacity: 0.5;
            top: 20%;
        }

        .illustration-text {
            text-align: center;
            z-index: 1;
        }

        .illustration-text h2 {
            font-weight: 700;
            color: var(--rb-blue);
            margin-bottom: 12px;
        }

        .illustration-text p {
            color: #475569;
            font-size: 1.1rem;
        }

        /* Form Side */
        .form-side {
            flex: 1;
            padding: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .brand-logo {
            font-weight: 800;
            font-size: 1.5rem;
            color: var(--rb-blue);
            margin-bottom: 40px;
        }

        .brand-logo span {
            color: var(--rb-orange);
        }

        .form-side h3 {
            font-weight: 700;
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .form-side p {
            color: #64748b;
            margin-bottom: 32px;
        }

        .form-label {
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .form-control {
            border: 2px solid #f1f5f9;
            border-radius: 16px;
            padding: 14px 20px;
            background-color: #f8fafc;
            font-weight: 500;
            transition: all 0.2s;
        }

        .form-control:focus {
            background-color: #fff;
            border-color: var(--rb-blue);
            box-shadow: none;
        }

        .btn-friendly {
            background-color: var(--rb-blue);
            color: #fff;
            border: none;
            border-radius: 16px;
            padding: 16px;
            font-weight: 700;
            font-size: 1.1rem;
            width: 100%;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .btn-friendly:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(6, 62, 112, 0.2);
            filter: brightness(1.1);
        }

        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 0.95rem;
        }

        .footer a {
            color: var(--rb-orange);
            font-weight: 700;
            text-decoration: none;
        }

        @media (max-width: 850px) {
            .illustration-side {
                display: none;
            }

            .form-side {
                padding: 40px;
            }

            .container-custom {
                max-width: 450px;
            }
        }
    </style>
</head>

<body>

    <div class="container-custom">
        <div class="illustration-side">
            <div class="circle-bg"></div>
            <!-- Mock SVG Illustration -->
            <svg class="illustration-image" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="50" y="50" width="300" height="200" rx="20" fill="white" />
                <rect x="80" y="80" width="60" height="10" rx="5" fill="#f1f5f9" />
                <rect x="80" y="100" width="240" height="10" rx="5" fill="#f1f5f9" />
                <rect x="80" y="120" width="180" height="10" rx="5" fill="#f1f5f9" />
                <circle cx="200" cy="200" r="40" fill="#fd6742" />
                <path d="M190 200L197 207L210 194" stroke="white" stroke-width="6" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
            <div class="illustration-text">
                <h2>Easy management</h2>
                <p>Everything you need for your workshop, in one place.</p>
            </div>
        </div>

        <div class="form-side">
            <div class="brand-logo">99<span>SmartX</span></div>

            <h3>Sign in</h3>
            <p>Welcome back workshop hero!</p>

            <form>
                <div class="mb-4">
                    <label class="form-label">Work Email</label>
                    <input type="email" class="form-control" placeholder="john@workshop.com">
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" placeholder="••••••••">
                </div>

                <div class="d-flex justify-content-between mb-4 small">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="keep">
                        <label class="form-check-label" for="keep">Keep me logged in</label>
                    </div>
                </div>

                <button type="submit" class="btn btn-friendly">Get Started</button>
            </form>

            <div class="footer">
                New teammate? <a href="#">Create account</a>
            </div>
        </div>
    </div>

</body>

</html>
