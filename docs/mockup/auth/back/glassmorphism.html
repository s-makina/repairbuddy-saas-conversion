<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | 99SmartX Glassmorphism</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        :root {
            --rb-blue: #063e70;
            --rb-orange: #fd6742;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Animated Mesh Gradient Background */
            background: linear-gradient(45deg, #063e70, #0a569a, #fd6742, #063e70);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .glass-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        /* Glass Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.1);
            padding: 50px 40px;
            color: #fff;
            text-align: center;
        }

        .brand-logo {
            margin-bottom: 30px;
        }

        .brand-logo h2 {
            font-weight: 800;
            font-size: 2rem;
            letter-spacing: -1px;
            margin: 0;
        }

        .brand-logo h2 span {
            color: #ffb8a7;
            /* lighter orange for glass theme */
        }

        .welcome-text h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 35px;
            opacity: 0.95;
        }

        .form-floating {
            margin-bottom: 20px;
        }

        .form-floating>.form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            color: #fff;
            padding: 1.25rem 1rem;
        }

        .form-floating>.form-control:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: #fff;
            box-shadow: 0 0 0 0.25rem rgba(255, 255, 255, 0.1);
        }

        .form-floating>label {
            color: rgba(255, 255, 255, 0.8);
            padding: 1rem;
        }

        .form-floating>.form-control::placeholder {
            color: transparent;
        }

        .form-floating>.form-control:focus~label,
        .form-floating>.form-control:not(:placeholder-shown)~label {
            color: #fff;
            transform: scale(.85) translateY(-.5rem) translateX(.15rem);
            opacity: 1;
        }

        .btn-glass {
            background: #fff;
            color: var(--rb-blue);
            border: none;
            border-radius: 15px;
            padding: 15px;
            width: 100%;
            font-weight: 700;
            font-size: 1.1rem;
            margin-top: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .btn-glass:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
            background: #f8f9fa;
        }

        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
            font-size: 0.85rem;
        }

        .options a {
            color: #fff;
            text-decoration: none;
            opacity: 0.8;
            font-weight: 500;
        }

        .options a:hover {
            opacity: 1;
            text-decoration: underline;
        }

        .signup-text {
            margin-top: 40px;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .signup-text a {
            color: #fff;
            text-decoration: none;
            font-weight: 700;
        }

        /* Decorative blobs */
        .blob {
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(253, 103, 66, 0.4);
            border-radius: 50%;
            filter: blur(80px);
            z-index: 1;
            animation: move 20s infinite alternate;
        }

        .blob-1 {
            top: -100px;
            right: -100px;
        }

        .blob-2 {
            bottom: -100px;
            left: -100px;
            background: rgba(30, 215, 96, 0.2);
        }

        @keyframes move {
            from {
                transform: translate(0, 0);
            }

            to {
                transform: translate(50px, 50px);
            }
        }

        /* Autofill color adjustment */
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus,
        input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px rgba(255, 255, 255, 0.1) inset !important;
            -webkit-text-fill-color: white !important;
            transition: background-color 5000s ease-in-out 0s;
        }
    </style>
</head>

<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="glass-container">
        <div class="glass-card">
            <div class="brand-logo">
                <h2>99<span>SmartX</span></h2>
            </div>

            <div class="welcome-text">
                <h1>Ready to repair?</h1>
            </div>

            <form>
                <div class="form-floating">
                    <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com">
                    <label for="floatingInput">Email address</label>
                </div>
                <div class="form-floating">
                    <input type="password" class="form-control" id="floatingPassword" placeholder="Password">
                    <label for="floatingPassword">Password</label>
                </div>

                <button type="submit" class="btn btn-glass">Secure Login</button>

                <div class="options">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="remember">
                        <label class="form-check-label" for="remember">Remember me</label>
                    </div>
                    <a href="#">Need help?</a>
                </div>
            </form>

            <div class="signup-text">
                New to 99SmartX? <a href="#">Start your journey</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
