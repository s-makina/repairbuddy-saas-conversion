<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | 99SmartX Neumorphism</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --bg-color: #e0e5ec;
            --shadow-light: #ffffff;
            --shadow-dark: #a3b1c6;
            --rb-blue: #063e70;
            --rb-orange: #fd6742;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: #4a5568;
        }

        .neu-card {
            width: 100%;
            max-width: 400px;
            padding: 50px;
            border-radius: 40px;
            background: var(--bg-color);
            box-shadow: 20px 20px 60px var(--shadow-dark),
                -20px -20px 60px var(--shadow-light);
            text-align: center;
        }

        .brand-logo {
            font-weight: 800;
            font-size: 1.5rem;
            color: var(--rb-blue);
            margin-bottom: 40px;
            display: inline-block;
            padding: 15px 30px;
            border-radius: 20px;
            box-shadow: inset 6px 6px 12px var(--shadow-dark),
                inset -6px -6px 12px var(--shadow-light);
        }

        .brand-logo span {
            color: var(--rb-orange);
        }

        h2 {
            font-weight: 700;
            font-size: 1.4rem;
            margin-bottom: 30px;
        }

        .neu-input-wrapper {
            margin-bottom: 25px;
            text-align: left;
        }

        .neu-label {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 10px;
            padding-left: 10px;
            display: block;
        }

        .neu-input {
            width: 100%;
            border: none;
            outline: none;
            background: var(--bg-color);
            padding: 15px 20px;
            border-radius: 15px;
            box-shadow: inset 8px 8px 16px var(--shadow-dark),
                inset -8px -8px 16px var(--shadow-light);
            transition: all 0.2s ease;
        }

        .neu-input:focus {
            box-shadow: inset 1px 1px 2px var(--shadow-dark),
                inset -1px -1px 2px var(--shadow-light);
        }

        .neu-btn {
            width: 100%;
            margin-top: 20px;
            padding: 15px;
            border: none;
            border-radius: 15px;
            background: var(--bg-color);
            color: var(--rb-blue);
            font-weight: 700;
            font-size: 1rem;
            box-shadow: 8px 8px 16px var(--shadow-dark),
                -8px -8px 16px var(--shadow-light);
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .neu-btn:active {
            box-shadow: inset 4px 4px 8px var(--shadow-dark),
                inset -4px -4px 8px var(--shadow-light);
            transform: scale(0.98);
        }

        .neu-btn-primary {
            background-color: var(--rb-blue);
            color: #fff;
            box-shadow: 8px 8px 16px #9ba7bb,
                -8px -8px 16px #ffffff;
        }

        .footer {
            margin-top: 40px;
            font-size: 0.85rem;
        }

        .footer a {
            color: var(--rb-blue);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <div class="neu-card">
        <div class="brand-logo">99<span>SmartX</span></div>

        <h2>Member Sign In</h2>

        <form>
            <div class="neu-input-wrapper">
                <span class="neu-label">Username</span>
                <input type="text" class="neu-input" placeholder="Enter username">
            </div>

            <div class="neu-input-wrapper">
                <span class="neu-label">Password</span>
                <input type="password" class="neu-input" placeholder="••••••••">
            </div>

            <button type="submit" class="neu-btn neu-btn-primary">Sign In</button>
            <button type="button" class="neu-btn">Fingerprint Log</button>
        </form>

        <div class="footer">
            Need help? <a href="#">Support Hub</a>
        </div>
    </div>

</body>

</html>
