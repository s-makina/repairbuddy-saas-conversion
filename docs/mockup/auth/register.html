<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | 99SmartX</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        :root {
            --rb-blue: #063e70;
            --rb-orange: #fd6742;
            --rb-bg-soft: #fcfdfe;
            --rb-border: #f1f5f9;
            --rb-text-main: #0f172a;
            --rb-text-muted: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--rb-bg-soft);
            background-image:
                radial-gradient(at 0% 0%, rgba(253, 103, 66, 0.03) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(6, 62, 112, 0.03) 0px, transparent 50%);
            color: var(--rb-text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .login-card {
            background: #ffffff;
            width: 100%;
            max-width: 480px;
            padding: 40px 48px;
            border-radius: 32px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(226, 232, 240, 0.8);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            animation: reveal 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--rb-blue), var(--rb-orange));
            opacity: 0.8;
        }

        .brand-logo {
            font-weight: 800;
            font-size: 2rem;
            color: var(--rb-blue);
            text-decoration: none;
            display: inline-block;
            margin-bottom: 24px;
            letter-spacing: -1px;
        }

        .brand-logo span {
            color: var(--rb-orange);
        }

        .login-header h1 {
            font-size: 1.85rem;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .login-header p {
            color: var(--rb-text-muted);
            font-size: 1rem;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--rb-text-main);
            margin-bottom: 8px;
        }

        .input-group-modern {
            position: relative;
            margin-bottom: 16px;
        }

        .input-group-modern i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--rb-text-muted);
            font-size: 1.1rem;
            transition: all 0.3s;
            pointer-events: none;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px 16px 12px 48px;
            border: 1.5px solid #eef2f6;
            font-size: 0.95rem;
            background-color: #fcfdfe;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--rb-blue);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(6, 62, 112, 0.08);
            outline: none;
        }

        .form-control:focus+i {
            color: var(--rb-blue);
        }

        .btn-modern {
            background-color: var(--rb-blue);
            color: #fff;
            border: none;
            border-radius: 16px;
            padding: 16px;
            font-weight: 700;
            font-size: 1.05rem;
            width: 100%;
            margin-top: 12px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 20px rgba(6, 62, 112, 0.1);
        }

        .btn-modern:hover {
            background-color: #05335d;
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(6, 62, 112, 0.2);
        }

        .footer-link {
            text-align: center;
            margin-top: 32px;
            font-size: 0.95rem;
            color: var(--rb-text-muted);
        }

        .footer-link a {
            color: var(--rb-blue);
            text-decoration: none;
            font-weight: 700;
        }

        @keyframes reveal {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="text-center">
            <a href="#" class="brand-logo">99<span>SmartX</span></a>
        </div>

        <div class="login-header text-center">
            <h1>Join Workshop</h1>
            <p>Create your account to start collaborating with your team.</p>
        </div>

        <form>
            <div class="row">
                <div class="col-md-6">
                    <div class="input-group-modern">
                        <label class="form-label">First Name</label>
                        <div style="position: relative;">
                            <input type="text" class="form-control" placeholder="John" required>
                            <i class="bi bi-person"></i>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="input-group-modern">
                        <label class="form-label">Last Name</label>
                        <div style="position: relative;">
                            <input type="text" class="form-control" placeholder="Doe" required>
                            <i class="bi bi-person"></i>
                        </div>
                    </div>
                </div>
            </div>


            <div class="input-group-modern">
                <label class="form-label">Email Address</label>
                <div style="position: relative;">
                    <input type="email" class="form-control" placeholder="john@example.com" required>
                    <i class="bi bi-envelope"></i>
                </div>
            </div>

            <div class="input-group-modern">
                <label class="form-label">Password</label>
                <div style="position: relative;">
                    <input type="password" class="form-control" placeholder="••••••••" required>
                    <i class="bi bi-lock"></i>
                </div>
            </div>

            <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" id="terms" required>
                <label class="form-check-label small text-muted" for="terms">
                    I agree to the <a href="#" class="text-decoration-none fw-bold"
                        style="color: var(--rb-blue);">Terms</a> and <a href="#" class="text-decoration-none fw-bold"
                        style="color: var(--rb-blue);">Privacy Policy</a>.
                </label>
            </div>

            <button type="submit" class="btn btn-modern">Create Account</button>
        </form>

        <div class="footer-link">
            Already have an account? <a href="minimalist.html">Log in</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
