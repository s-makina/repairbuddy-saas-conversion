<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmation</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f7f7f7;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #2c304d;
        }

        .wrapper {
            width: 100%;
            padding: 20px 0;
        }

        .content {
            max-width: 500px;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 1px 10px rgba(0, 0, 0, 0.05);
            border: 1px solid #ededed;
        }

        .header {
            background-color: #063e70;
            padding: 15px 20px;
            text-align: left;
        }

        .header h1 {
            color: #ffffff;
            margin: 0;
            font-size: 18px;
            font-weight: 700;
        }

        .body {
            padding: 20px;
        }

        .info-grid {
            display: table;
            width: 100%;
            margin-bottom: 20px;
            background: #f9fafb;
            padding: 12px;
            border-radius: 6px;
        }

        .info-row {
            display: table-row;
        }

        .info-label {
            display: table-cell;
            font-weight: 600;
            padding: 4px 0;
            width: 100px;
            font-size: 13px;
            color: #667085;
        }

        .info-value {
            display: table-cell;
            padding: 4px 0;
            font-size: 13px;
            color: #2c304d;
        }

        .dynamic-content {
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .cta-container {
            text-align: left;
        }

        .btn {
            display: inline-block;
            background-color: #fd6742;
            color: #ffffff;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }

        .footer {
            padding: 15px 20px;
            text-align: center;
            font-size: 11px;
            color: #98a2b3;
            border-top: 1px solid #ededed;
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <div class="content">
            <div class="header">
                <h1>RepairBuddy</h1>
            </div>
            <div class="body">
                <div class="info-grid">
                    <div class="info-row">
                        <div class="info-label">Case Number:</div>
                        <div class="info-value"><strong>{{case_number}}</strong></div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">Device:</div>
                        <div class="info-value">{{customer_device_label}}</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">Job ID:</div>
                        <div class="info-value">#{{job_id}}</div>
                    </div>
                </div>

                <div class="dynamic-content">
                    {!! $renderedBody !!}
                </div>

                <div class="cta-container">
                    <a href="{{status_check_link}}" class="btn">Track Repair</a>
                </div>
            </div>
            <div class="footer">
                &copy; {{ date('Y') }} RepairBuddy. <a href="#" style="color: #98a2b3;">Unsubscribe</a>
            </div>
        </div>
    </div>
</body>

</html>
