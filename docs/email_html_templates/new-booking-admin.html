<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Booking Notification</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f7f7f7;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #2c304d;
        }

        .wrapper {
            width: 100%;
            padding: 20px 0;
        }

        .content {
            max-width: 500px;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 1px 10px rgba(0, 0, 0, 0.05);
            border: 1px solid #ededed;
        }

        .header {
            background-color: #fd6742;
            padding: 10px 20px;
            text-align: left;
        }

        .header h1 {
            color: #ffffff;
            margin: 0;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .body {
            padding: 20px;
        }

        .title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #2c304d;
        }

        .info-grid {
            display: table;
            width: 100%;
            margin-bottom: 15px;
            background: #f9fafb;
            padding: 10px;
            border-radius: 6px;
        }

        .info-row {
            display: table-row;
        }

        .info-label {
            display: table-cell;
            font-weight: 600;
            padding: 3px 0;
            width: 110px;
            font-size: 12px;
            color: #667085;
        }

        .info-value {
            display: table-cell;
            padding: 3px 0;
            font-size: 12px;
            color: #2c304d;
        }

        .message-area {
            font-size: 13px;
            line-height: 1.4;
            color: #475467;
            border-left: 3px solid #fd6742;
            padding-left: 12px;
            margin-bottom: 20px;
        }

        .cta-container {
            text-align: left;
        }

        .btn {
            display: inline-block;
            background-color: #063e70;
            color: #ffffff;
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            font-size: 13px;
        }

        .footer {
            padding: 10px 20px;
            font-size: 10px;
            color: #98a2b3;
            border-top: 1px solid #ededed;
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <div class="content">
            <div class="header">
                <h1>RepairBuddy Admin Alert</h1>
            </div>
            <div class="body">
                <div class="title">New Booking: {{case_number}}</div>

                <div class="info-grid">
                    <div class="info-row">
                        <div class="info-label">Customer:</div>
                        <div class="info-value">{{customer_full_name}}</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">Device:</div>
                        <div class="info-value">{{customer_device_label}}</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">Job ID:</div>
                        <div class="info-value">#{{job_id}}</div>
                    </div>
                </div>

                <div class="message-area">
                    {!! $renderedBody !!}
                </div>

                <div class="cta-container">
                    <a href="#" class="btn">View in Dashboard</a>
                </div>
            </div>
            <div class="footer">
                Automated notification. RepairBuddy SaaS.
            </div>
        </div>
    </div>
</body>

</html>
